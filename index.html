<html lang="en">
<head>
  <meta charset="utf-8" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=Oswald:wght@600;700&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg:#070707;
      --text:#fff;
      --muted:rgba(255,255,255,.70);
      --line:rgba(255,255,255,.13);
      --line2:rgba(255,255,255,.22);
      --gold:#f5c542;
      --blue:#1e90ff;
      --blue2:#1479db;
      --green:#29d17d;
      --max:1180px;
      --shadow:0 22px 70px rgba(0,0,0,.38);
      color-scheme:dark;
    }

    *{box-sizing:border-box}
    html{min-height:100%;scroll-behavior:smooth}
    body{
      min-height:100%;
      margin:0;
      font-family:Inter,Arial,sans-serif;
      background:
        radial-gradient(circle at 16% 0%, rgba(245,197,66,.18), transparent 31rem),
        radial-gradient(circle at 84% 0%, rgba(30,144,255,.20), transparent 34rem),
        linear-gradient(180deg,#070707,#111 48rem,#080808);
      color:var(--text);
    }

    a{color:inherit}
    button,input{font:inherit}

    .page{position:relative;overflow:hidden}
    .cardWall{
      position:absolute;
      inset:0 0 auto 0;
      height:590px;
      pointer-events:none;
      opacity:.28;
      background-image:
        linear-gradient(90deg, rgba(255,255,255,.10) 1px, transparent 1px),
        linear-gradient(180deg, rgba(255,255,255,.10) 1px, transparent 1px);
      background-size:78px 108px;
      mask-image:linear-gradient(180deg,#000 0%,rgba(0,0,0,.78) 52%,transparent 100%);
    }

    .cardWall:after{
      content:"";
      position:absolute;
      inset:0;
      background:
        radial-gradient(circle at 38% 16%, rgba(245,197,66,.22), transparent 15rem),
        radial-gradient(circle at 68% 10%, rgba(30,144,255,.20), transparent 17rem);
    }

    .wrap{
      position:relative;
      width:min(var(--max), calc(100% - 32px));
      margin:0 auto;
      padding:20px 0 42px;
    }

    .topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:16px;
      min-height:54px;
      margin-bottom:18px;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:12px;
      text-decoration:none;
      min-width:0;
    }

    .brandMark{
      width:38px;
      height:38px;
